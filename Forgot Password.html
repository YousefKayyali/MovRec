<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="Forgot Password.css"> <!-- Link to external CSS file -->
</head>
<body>
    <div class="forgot-password-container">
        <h1>Forgot Password</h1>
        <p>Enter your email address and we will send a code to reset your password.</p>
        <form id="forgotPasswordForm">
            <input type="email" id="email" class="input-field" placeholder="Email Address" required />
            <button type="submit" class="submit-btn">Send Code</button>
        </form>
        <div class="message" id="message"></div>
    </div>

    <script>
        // Simulate backend functionality for sending an email
        async function sendCodeToEmail(email) {
            // Simulate a delay for email sending
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(`Code sent to ${email}`);
                }, 2000);
            });
        }

        // Handle form submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent form submission
            const email = document.getElementById('email').value;
            const message = document.getElementById('message');

            // Reset message
            message.textContent = '';
            message.className = 'message';

            // Validate email format
            if (!email.includes('@') || !email.includes('.')) {
                message.textContent = 'Please enter a valid email address.';
                message.className = 'message error';
                return;
            }

            // Simulate sending the code to the email
            message.textContent = 'Sending code...';
            try {
                const response = await sendCodeToEmail(email);
                message.textContent = response;
            } catch (error) {
                message.textContent = 'Failed to send the code. Please try again later.';
                message.className = 'message error';
            }
        });
    </script>
</body>
</html>
