<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css"> <!-- Link to external CSS file -->
</head>
<body>

    <div class="login-container">
        <h1>Login</h1>
        <form id="loginForm">
            <input type="email" id="email" class="input-field" placeholder="Email" required />
            <input type="password" id="password" class="input-field" placeholder="Password" required />
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="error-message" id="error-message"></div>

        <div class="forgot-password">
            <a href="Forgot Password.html">Forgot password?</a>
        </div>
        <div class="forgot-password">
            <a href="SignUp.html">create account</a>
        </div>
    </div>

    <script>
        // JavaScript for Form Validation
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form submission

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Simple validation (can be extended further)
            if (!email || !password) {
                errorMessage.textContent = 'Please fill in both fields.';
            } else {
                errorMessage.textContent = ''; // Clear error message
                // Proceed with login (you can add actual login logic here)
                alert('Logged in successfully!');
                // Redirect or perform any action upon successful login
                window.location.href = 'home.html'; // Redirect to home page (example)
            }
        });
    </script>

</body>
</html>
